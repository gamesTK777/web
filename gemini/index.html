<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Racing JS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 70vh;
        }
        /* メニュー画面 */
        #menu {
            position: absolute;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 10;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #e74c3c;
            color: white;
            transition: 0.2s;
        }
        button:hover { background: #c0392b; }
        
        /* モバイル操作パネル */
        #controls {
            display: none;
            width: 100%;
            padding: 10px;
            justify-content: space-around;
            position: absolute;
            bottom: 20px;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            font-weight: bold;
        }
        .info {
            position: absolute;
            top: 10px;
            font-size: 1.2rem;
            text-shadow: 2px 2px 2px black;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="info" id="hud">コースを3周しよう！</div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="menu">
        <h1>RETRO RACER</h1>
        <p>操作: PC [矢印キー / WASD] <br> スマホ [画面下ボタン]</p>
        <button onclick="startGame(1)">1 PLAYER</button>
        <button onclick="startGame(2)">2 PLAYERS</button>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <div class="btn" id="btn-left">←</div>
            <div class="btn" id="btn-right">→</div>
        </div>
        <div class="btn" id="btn-gas" style="background:rgba(46, 204, 113, 0.5)">GAS</div>
    </div>
</div>

<script>
/**
 * ゲーム設定と初期化
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const hud = document.getElementById('hud');
const controlPanel = document.getElementById('controls');

canvas.width = 800;
canvas.height = 600;

let gameActive = false;
let mode = 1; // 1 or 2 players
let players = [];

// コースのポイント (簡易的なオーバルコース)
const trackOuter = [
    {x: 100, y: 100}, {x: 700, y: 100}, {x: 750, y: 150},
    {x: 750, y: 450}, {x: 700, y: 500}, {x: 100, y: 500},
    {x: 50, y: 450}, {x: 50, y: 150}
];
const trackInner = [
    {x: 200, y: 200}, {x: 600, y: 200}, {x: 630, y: 230},
    {x: 630, y: 370}, {x: 600, y: 400}, {x: 200, y: 400},
    {x: 170, y: 370}, {x: 170, y: 230}
];

// 入力管理
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// タッチ入力
const touch = { left: false, right: false, gas: false };
const setupTouch = (id, key) => {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); touch[key] = true; el.style.background = "rgba(255,255,255,0.5)"; };
    const end = (e) => { e.preventDefault(); touch[key] = false; el.style.background = ""; };
    el.addEventListener('touchstart', start);
    el.addEventListener('touchend', end);
};
setupTouch('btn-left', 'left');
setupTouch('btn-right', 'right');
setupTouch('btn-gas', 'gas');

if ('ontouchstart' in window) controlPanel.style.display = 'flex';

/**
 * プレイヤークラス
 */
class Car {
    constructor(id, x, y, color) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.color = color;
        this.angle = 0;
        this.speed = 0;
        this.maxSpeed = 5;
        this.accel = 0.15;
        this.friction = 0.05;
        this.turnSpeed = 0.06;
        this.laps = 0;
        this.passedCheckpoint = false;
    }

    update() {
        let input = { gas: false, left: false, right: false };

        if (this.id === 1) {
            input.gas = keys['ArrowUp'] || keys['KeyW'] || touch.gas;
            input.left = keys['ArrowLeft'] || keys['KeyA'] || touch.left;
            input.right = keys['ArrowRight'] || keys['KeyD'] || touch.right;
        } else {
            // 2Pはキーボードのみ (IJKLまたはテンキー想定だが、ここでは簡易的に分ける)
            input.gas = keys['KeyI'];
            input.left = keys['KeyJ'];
            input.right = keys['KeyL'];
        }

        // 加速・減速
        if (input.gas) {
            this.speed += this.accel;
        } else {
            this.speed -= this.friction;
        }
        this.speed = Math.max(0, Math.min(this.speed, this.maxSpeed));

        // ハンドル
        if (this.speed > 0.5) {
            if (input.left) this.angle -= this.turnSpeed;
            if (input.right) this.angle += this.turnSpeed;
        }

        // 移動
        const nx = this.x + Math.cos(this.angle) * this.speed;
        const ny = this.y + Math.sin(this.angle) * this.speed;

        // コースアウト判定（芝生に入ると減速）
        if (!ctx.isPointInPath(coursePath, nx, ny)) {
            this.speed *= 0.9;
        }

        this.x = nx;
        this.y = ny;

        // チェックポイント・周回判定
        if (this.x > 400 && this.y > 400) this.passedCheckpoint = true;
        if (this.passedCheckpoint && this.x < 150 && this.y < 300) {
            this.laps++;
            this.passedCheckpoint = false;
            if (this.laps >= 3) endGame(this.id);
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        ctx.fillRect(-15, -10, 30, 20); // 車体
        ctx.fillStyle = "black";
        ctx.fillRect(5, -12, 8, 4); // タイヤ
        ctx.fillRect(5, 8, 8, 4);
        ctx.fillStyle = "cyan";
        ctx.fillRect(5, -5, 5, 10); // 窓
        ctx.restore();
    }
}

let coursePath = new Path2D();
function createCourse() {
    coursePath = new Path2D();
    coursePath.moveTo(trackOuter[0].x, trackOuter[0].y);
    trackOuter.forEach(p => coursePath.lineTo(p.x, p.y));
    coursePath.closePath();
    
    // 内側の穴
    coursePath.moveTo(trackInner[0].x, trackInner[0].y);
    trackInner.forEach(p => coursePath.lineTo(p.x, p.y));
    coursePath.closePath();
}

function drawTrack() {
    // 芝生
    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(0,0,canvas.width, canvas.height);

    // 道路
    ctx.fillStyle = "#555";
    ctx.fill(coursePath);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke(coursePath);

    // スタートライン
    ctx.fillStyle = "white";
    ctx.fillRect(100, 100, 10, 100);
}

function startGame(m) {
    mode = m;
    gameActive = true;
    menu.style.display = 'none';
    players = [new Car(1, 120, 130, "#e74c3c")];
    if (mode === 2) {
        players.push(new Car(2, 120, 170, "#3498db"));
        hud.innerText = "1P:矢印 / 2P:IJKL - 3周先取で勝利！";
    } else {
        hud.innerText = "3周走ってゴールを目指せ！";
    }
    createCourse();
    requestAnimationFrame(gameLoop);
}

function endGame(winnerId) {
    gameActive = false;
    menu.style.display = 'block';
    const msg = mode === 2 ? `PLAYER ${winnerId} の勝利！` : "ゴール！お疲れ様でした。";
    menu.innerHTML = `<h1>${msg}</h1><button onclick="location.reload()">もう一度</button>`;
}

function gameLoop() {
    if (!gameActive) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawTrack();

    players.forEach(p => {
        p.update();
        p.draw();
    });

    // 簡易HUD更新
    if (mode === 1) {
        hud.innerText = `LAPS: ${players[0].laps} / 3`;
    } else {
        hud.innerText = `1P: ${players[0].laps}周 | 2P: ${players[1].laps}周`;
    }

    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
