<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON DRIFT RACING</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  canvas {
    display: block;
  }

  #menu {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, #0a0a0f 70%);
    z-index: 100;
    gap: 20px;
  }

  #menu.hidden { display: none; }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 7vw, 72px);
    font-weight: 900;
    background: linear-gradient(135deg, #00f0ff, #ff00e5, #ffe600);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    letter-spacing: 4px;
    margin-bottom: 8px;
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
  }

  .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(12px, 2.5vw, 18px);
    color: #888;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .menu-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 700;
    padding: 16px 48px;
    border: 2px solid;
    background: transparent;
    color: #fff;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    min-width: 280px;
    position: relative;
    overflow: hidden;
  }

  .menu-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-1p {
    border-color: #00f0ff;
    text-shadow: 0 0 10px #00f0ff55;
  }
  .btn-1p::before { background: linear-gradient(135deg, #00f0ff22, #00f0ff08); }
  .btn-1p:hover, .btn-1p:active {
    background: #00f0ff18;
    box-shadow: 0 0 30px #00f0ff44, inset 0 0 30px #00f0ff11;
    transform: scale(1.05);
  }
  .btn-1p:hover::before, .btn-1p:active::before { opacity: 1; }

  .btn-2p {
    border-color: #ff00e5;
    text-shadow: 0 0 10px #ff00e555;
  }
  .btn-2p::before { background: linear-gradient(135deg, #ff00e522, #ff00e508); }
  .btn-2p:hover, .btn-2p:active {
    background: #ff00e518;
    box-shadow: 0 0 30px #ff00e544, inset 0 0 30px #ff00e511;
    transform: scale(1.05);
  }
  .btn-2p:hover::before, .btn-2p:active::before { opacity: 1; }

  .controls-info {
    margin-top: 24px;
    text-align: center;
    color: #666;
    font-size: clamp(11px, 2vw, 14px);
    line-height: 1.8;
    max-width: 500px;
  }

  .controls-info span {
    color: #aaa;
    font-weight: 600;
  }

  #hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: none;
    justify-content: space-between;
    padding: 10px 16px;
    z-index: 50;
    pointer-events: none;
    font-family: 'Orbitron', sans-serif;
  }
  #hud.active { display: flex; }

  .hud-panel {
    background: #000000aa;
    border-radius: 8px;
    padding: 6px 14px;
    border: 1px solid #333;
    backdrop-filter: blur(4px);
  }

  .hud-label {
    font-size: clamp(8px, 1.5vw, 11px);
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hud-value {
    font-size: clamp(14px, 3vw, 22px);
    font-weight: 700;
  }

  .p1-color { color: #00f0ff; }
  .p2-color { color: #ff00e5; }
  .ai-color { color: #ff6600; }

  #countdown {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 80;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(60px, 15vw, 140px);
    font-weight: 900;
    color: #ffe600;
    text-shadow: 0 0 40px #ffe60088, 0 0 80px #ffe60044;
    pointer-events: none;
    animation: countPop 0.5s ease-out;
  }
  #countdown.active { display: flex; }

  @keyframes countPop {
    0% { transform: scale(2); opacity: 0; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  #result {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 90;
    background: #000000cc;
    backdrop-filter: blur(8px);
    gap: 16px;
  }
  #result.active { display: flex; }

  .result-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 4px;
  }

  .result-detail {
    font-size: clamp(14px, 3vw, 22px);
    color: #ccc;
  }

  #touch-controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: none;
    z-index: 60;
    pointer-events: none;
  }
  #touch-controls.active { display: flex; }

  .touch-zone {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 12px;
    pointer-events: auto;
  }

  .touch-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: min(180px, 28vw);
    height: min(180px, 28vw);
    gap: 3px;
    opacity: 0.5;
  }

  .touch-btn {
    background: #ffffff18;
    border: 1px solid #ffffff33;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(16px, 4vw, 24px);
    color: #fff;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
  }

  .touch-btn:active, .touch-btn.pressed {
    background: #ffffff44;
    border-color: #ffffff88;
  }

  .touch-btn.empty {
    background: transparent;
    border-color: transparent;
    pointer-events: none;
  }

  .back-btn {
    pointer-events: auto;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(11px, 2vw, 14px);
    padding: 10px 28px;
    border: 1px solid #888;
    background: #000000aa;
    color: #fff;
    cursor: pointer;
    letter-spacing: 2px;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .back-btn:hover, .back-btn:active {
    border-color: #ffe600;
    color: #ffe600;
  }

  .player-label-touch {
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(9px, 1.5vw, 12px);
    letter-spacing: 2px;
    margin-bottom: 6px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div id="menu">
  <div class="title">NEON DRIFT</div>
  <div class="subtitle">RACING</div>
  <button class="menu-btn btn-1p" onclick="startGame(1)">1 PLAYER</button>
  <button class="menu-btn btn-2p" onclick="startGame(2)">2 PLAYERS</button>
  <div class="controls-info">
    <span>1P</span> : WASD or Arrow Keys / Touch Pad<br>
    <span>2P</span> : P1 = WASD / Left Pad &nbsp;|&nbsp; P2 = Arrow Keys / Right Pad<br>
    3周先にゴールした方が勝ち！
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div class="hud-panel">
    <div class="hud-label p1-color">P1</div>
    <div class="hud-value p1-color" id="hud-p1-lap">LAP 0/3</div>
  </div>
  <div class="hud-panel" id="hud-center" style="text-align:center">
    <div class="hud-label" style="color:#ffe600">TIME</div>
    <div class="hud-value" style="color:#ffe600" id="hud-time">0.0s</div>
  </div>
  <div class="hud-panel">
    <div class="hud-label" id="hud-p2-label">P2</div>
    <div class="hud-value" id="hud-p2-lap">LAP 0/3</div>
  </div>
</div>

<div id="countdown"></div>

<div id="result">
  <div class="result-title" id="result-title"></div>
  <div class="result-detail" id="result-detail"></div>
  <button class="back-btn" onclick="backToMenu()">MENU</button>
  <button class="back-btn" onclick="restartGame()">RETRY</button>
</div>

<div id="touch-controls">
  <div class="touch-zone" id="touch-zone-left">
    <div>
      <div class="player-label-touch p1-color">P1</div>
      <div class="touch-pad" id="pad-left">
        <div class="touch-btn empty"></div>
        <div class="touch-btn" data-dir="up" data-player="0">▲</div>
        <div class="touch-btn empty"></div>
        <div class="touch-btn" data-dir="left" data-player="0">◀</div>
        <div class="touch-btn empty"></div>
        <div class="touch-btn" data-dir="right" data-player="0">▶</div>
        <div class="touch-btn empty"></div>
        <div class="touch-btn" data-dir="down" data-player="0">▼</div>
        <div class="touch-btn empty"></div>
      </div>
    </div>
  </div>
  <div class="touch-zone" id="touch-zone-right">
    <div>
      <div class="player-label-touch" id="touch-p2-label">P2</div>
      <div class="touch-pad" id="pad-right">
        <div class="touch-btn empty"></div>
        <div class="touch-btn" data-dir="up" data-player="1">▲</div>
        <div class="touch-btn empty"></div>
        <div class="touch-btn" data-dir="left" data-player="1">◀</div>
        <div class="touch-btn empty"></div>
        <div class="touch-btn" data-dir="right" data-player="1">▶</div>
        <div class="touch-btn empty"></div>
        <div class="touch-btn" data-dir="down" data-player="1">▼</div>
        <div class="touch-btn empty"></div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- State ---
let gameMode = 0; // 1 or 2
let gameState = 'menu'; // menu, countdown, racing, finished
let raceTime = 0;
let totalLaps = 3;
let lastMode = 1;

// --- Track Definition (oval-ish circuit) ---
const trackPoints = [];
const trackWidth = 100;

function buildTrack(w, h) {
  trackPoints.length = 0;
  const cx = w / 2, cy = h / 2;
  const rx = Math.min(w, h) * 0.37;
  const ry = Math.min(w, h) * 0.30;
  const numPts = 200;
  for (let i = 0; i < numPts; i++) {
    const a = (i / numPts) * Math.PI * 2;
    // Add some variation for interesting shape
    const wobble = Math.sin(a * 3) * rx * 0.12 + Math.cos(a * 5) * ry * 0.06;
    const px = cx + Math.cos(a) * (rx + wobble);
    const py = cy + Math.sin(a) * (ry + wobble * 0.7);
    trackPoints.push({ x: px, y: py });
  }
}

function getTrackPoint(t) {
  const n = trackPoints.length;
  const idx = ((t % 1) + 1) % 1 * n;
  const i0 = Math.floor(idx) % n;
  const i1 = (i0 + 1) % n;
  const frac = idx - Math.floor(idx);
  return {
    x: trackPoints[i0].x + (trackPoints[i1].x - trackPoints[i0].x) * frac,
    y: trackPoints[i0].y + (trackPoints[i1].y - trackPoints[i0].y) * frac,
  };
}

function getTrackDir(t) {
  const dt = 0.001;
  const p0 = getTrackPoint(t);
  const p1 = getTrackPoint(t + dt);
  const dx = p1.x - p0.x, dy = p1.y - p0.y;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  return { x: dx / len, y: dy / len };
}

// --- Car ---
class Car {
  constructor(color, glowColor, playerIdx) {
    this.color = color;
    this.glow = glowColor;
    this.playerIdx = playerIdx;
    this.x = 0; this.y = 0; this.angle = 0;
    this.speed = 0;
    this.trackT = 0; // 0..1 position on track (for lap counting)
    this.lap = 0;
    this.lastCross = 0;
    this.finished = false;
    this.finishTime = 0;
    this.steer = 0;
    this.accel = 0;
    this.brake = 0;
    this.trail = [];
    // Physics
    this.maxSpeed = 5.5;
    this.accelRate = 0.12;
    this.brakeRate = 0.08;
    this.friction = 0.97;
    this.turnSpeed = 0.045;
    this.offTrackFriction = 0.92;
    this.w = 22; this.h = 36;
  }

  reset(t) {
    const p = getTrackPoint(t);
    const d = getTrackDir(t);
    this.x = p.x; this.y = p.y;
    this.angle = Math.atan2(d.y, d.x);
    this.speed = 0;
    this.trackT = t;
    this.lap = 0;
    this.lastCross = 0;
    this.finished = false;
    this.finishTime = 0;
    this.steer = 0;
    this.accel = 0;
    this.brake = 0;
    this.trail = [];
  }

  isOnTrack() {
    // Check distance to nearest track point
    let minDist = Infinity;
    const n = trackPoints.length;
    const step = Math.max(1, Math.floor(n / 60));
    for (let i = 0; i < n; i += step) {
      const dx = this.x - trackPoints[i].x;
      const dy = this.y - trackPoints[i].y;
      minDist = Math.min(minDist, dx * dx + dy * dy);
    }
    return minDist < (trackWidth * 0.52) * (trackWidth * 0.52);
  }

  findTrackT() {
    let best = this.trackT;
    let bestDist = Infinity;
    const n = trackPoints.length;
    // Search nearby
    for (let di = -10; di <= 10; di++) {
      const t = ((this.trackT * n + di) % n + n) % n / n;
      const p = getTrackPoint(t);
      const dx = this.x - p.x, dy = this.y - p.y;
      const d = dx * dx + dy * dy;
      if (d < bestDist) { bestDist = d; best = t; }
    }
    return best;
  }

  update(dt) {
    if (this.finished) return;

    // Acceleration
    if (this.accel > 0) {
      this.speed += this.accelRate * this.accel;
    }
    if (this.brake > 0) {
      this.speed -= this.brakeRate * this.brake;
    }

    // Steering
    if (Math.abs(this.speed) > 0.3) {
      this.angle += this.steer * this.turnSpeed * (this.speed > 0 ? 1 : -0.5);
    }

    // Friction
    const onTrack = this.isOnTrack();
    this.speed *= onTrack ? this.friction : this.offTrackFriction;

    // Clamp
    this.speed = Math.max(-this.maxSpeed * 0.3, Math.min(this.maxSpeed, this.speed));
    if (Math.abs(this.speed) < 0.01) this.speed = 0;

    // Move
    this.x += Math.cos(this.angle) * this.speed * dt;
    this.y += Math.sin(this.angle) * this.speed * dt;

    // Trail
    if (Math.abs(this.speed) > 1.5) {
      this.trail.push({ x: this.x, y: this.y, age: 0 });
      if (this.trail.length > 80) this.trail.shift();
    }
    for (const t of this.trail) t.age += dt;
    this.trail = this.trail.filter(t => t.age < 40);

    // Lap tracking
    const prevT = this.trackT;
    this.trackT = this.findTrackT();

    // Detect crossing start line (t ≈ 0)
    if (prevT > 0.9 && this.trackT < 0.1) {
      this.lap++;
      if (this.lap >= totalLaps) {
        this.finished = true;
        this.finishTime = raceTime;
      }
    } else if (prevT < 0.1 && this.trackT > 0.9) {
      this.lap = Math.max(0, this.lap - 1);
    }
  }

  draw(ctx) {
    // Trail
    for (const t of this.trail) {
      const alpha = Math.max(0, 1 - t.age / 40) * 0.3;
      ctx.fillStyle = this.glow + Math.floor(alpha * 255).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle + Math.PI / 2);

    // Glow
    ctx.shadowColor = this.glow;
    ctx.shadowBlur = 18;

    // Body
    const w = this.w, h = this.h;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.moveTo(0, -h / 2);
    ctx.lineTo(w / 2, h / 2 - 4);
    ctx.quadraticCurveTo(w / 2, h / 2, 0, h / 2);
    ctx.quadraticCurveTo(-w / 2, h / 2, -w / 2, h / 2 - 4);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#000';
    ctx.fillRect(-w / 4, -h / 6, w / 2, h / 3);

    // Stripe
    ctx.fillStyle = this.glow;
    ctx.fillRect(-1.5, -h / 2 + 3, 3, h - 10);

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// --- AI ---
class AI {
  constructor(car) {
    this.car = car;
    this.targetT = 0;
    this.skill = 0.85 + Math.random() * 0.1; // slight variation
  }

  update() {
    const car = this.car;
    // Look ahead on track
    const lookAhead = 0.04 + (car.speed / car.maxSpeed) * 0.03;
    const targetT = (car.trackT + lookAhead) % 1;
    const target = getTrackPoint(targetT);

    const dx = target.x - car.x;
    const dy = target.y - car.y;
    const targetAngle = Math.atan2(dy, dx);

    let angleDiff = targetAngle - car.angle;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

    // Steering
    if (angleDiff > 0.05) car.steer = Math.min(1, angleDiff * 3) * this.skill;
    else if (angleDiff < -0.05) car.steer = Math.max(-1, angleDiff * 3) * this.skill;
    else car.steer = 0;

    // Throttle
    const turnAmount = Math.abs(angleDiff);
    if (turnAmount > 0.5) {
      car.accel = 0.4 * this.skill;
      car.brake = 0.2;
    } else {
      car.accel = this.skill;
      car.brake = 0;
    }
  }
}

// --- Players ---
let cars = [];
let ai = null;

// --- Input ---
const keys = {};
const touchInput = [
  { up: false, down: false, left: false, right: false },
  { up: false, down: false, left: false, right: false },
];

document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; e.preventDefault(); });

// Touch
function setupTouch() {
  const btns = document.querySelectorAll('.touch-btn[data-dir]');
  btns.forEach(btn => {
    const dir = btn.dataset.dir;
    const p = parseInt(btn.dataset.player);

    const onStart = (e) => { e.preventDefault(); touchInput[p][dir] = true; btn.classList.add('pressed'); };
    const onEnd = (e) => { e.preventDefault(); touchInput[p][dir] = false; btn.classList.remove('pressed'); };

    btn.addEventListener('touchstart', onStart, { passive: false });
    btn.addEventListener('touchend', onEnd, { passive: false });
    btn.addEventListener('touchcancel', onEnd, { passive: false });
    btn.addEventListener('mousedown', onStart);
    btn.addEventListener('mouseup', onEnd);
    btn.addEventListener('mouseleave', onEnd);
  });
}

function applyInput(car, playerIdx) {
  let up = false, down = false, left = false, right = false;

  if (playerIdx === 0) {
    up = keys['w'] || keys['arrowup'] || touchInput[0].up;
    down = keys['s'] || keys['arrowdown'] || touchInput[0].down;
    left = keys['a'] || keys['arrowleft'] || touchInput[0].left;
    right = keys['d'] || keys['arrowright'] || touchInput[0].right;
  }
  if (playerIdx === 0 && gameMode === 2) {
    // 2P: P1 uses WASD only
    up = keys['w'] || touchInput[0].up;
    down = keys['s'] || touchInput[0].down;
    left = keys['a'] || touchInput[0].left;
    right = keys['d'] || touchInput[0].right;
  }
  if (playerIdx === 1) {
    up = keys['arrowup'] || touchInput[1].up;
    down = keys['arrowdown'] || touchInput[1].down;
    left = keys['arrowleft'] || touchInput[1].left;
    right = keys['arrowright'] || touchInput[1].right;
  }

  car.accel = up ? 1 : 0;
  car.brake = down ? 1 : 0;
  car.steer = (left ? -1 : 0) + (right ? 1 : 0);
}

// --- Resize ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  buildTrack(canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// --- Game Functions ---
function startGame(mode) {
  gameMode = mode;
  lastMode = mode;
  document.getElementById('menu').classList.add('hidden');

  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  cars = [];
  ai = null;

  const p1 = new Car('#00d4e6', '#00f0ff', 0);
  cars.push(p1);

  if (mode === 1) {
    const aiCar = new Car('#ff6600', '#ff8800', 1);
    cars.push(aiCar);
    ai = new AI(aiCar);
    document.getElementById('hud-p2-label').className = 'hud-label ai-color';
    document.getElementById('hud-p2-lap').className = 'hud-value ai-color';
    if (isMobile) {
      document.getElementById('touch-zone-right').style.display = 'none';
      document.getElementById('touch-zone-left').style.flex = '1';
    }
    document.getElementById('touch-p2-label').textContent = 'AI';
    document.getElementById('touch-p2-label').className = 'player-label-touch ai-color';
  } else {
    const p2 = new Car('#e600c8', '#ff00e5', 1);
    cars.push(p2);
    document.getElementById('hud-p2-label').className = 'hud-label p2-color';
    document.getElementById('hud-p2-lap').className = 'hud-value p2-color';
    if (isMobile) {
      document.getElementById('touch-zone-right').style.display = '';
      document.getElementById('touch-zone-left').style.flex = '';
    }
    document.getElementById('touch-p2-label').textContent = 'P2';
    document.getElementById('touch-p2-label').className = 'player-label-touch p2-color';
  }

  // Position cars at start
  resize();
  cars[0].reset(0.0);
  cars[1].reset(0.97); // Slightly behind

  // Offset laterally
  const d0 = getTrackDir(0.0);
  cars[0].x += -d0.y * 15;
  cars[0].y += d0.x * 15;
  const d1 = getTrackDir(0.97);
  cars[1].x += d1.y * 15;
  cars[1].y += -d1.x * 15;

  // Show HUD and touch
  document.getElementById('hud').classList.add('active');
  if (isMobile) {
    document.getElementById('touch-controls').classList.add('active');
  }

  raceTime = 0;
  gameState = 'countdown';
  countdownStart();
}

let countdownTimer = 0;
let countdownVal = 3;

function countdownStart() {
  countdownVal = 3;
  countdownTimer = 0;
  const el = document.getElementById('countdown');
  el.classList.add('active');
  el.textContent = '3';
}

function countdownUpdate(dt) {
  countdownTimer += dt;
  const newVal = 3 - Math.floor(countdownTimer);
  if (newVal !== countdownVal && newVal >= 0) {
    countdownVal = newVal;
    const el = document.getElementById('countdown');
    el.textContent = newVal === 0 ? 'GO!' : newVal.toString();
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'countPop 0.5s ease-out';
    if (newVal === 0) {
      el.style.color = '#00ff88';
      el.style.textShadow = '0 0 40px #00ff8888, 0 0 80px #00ff8844';
    }
  }
  if (countdownTimer > 3.5) {
    const el = document.getElementById('countdown');
    el.classList.remove('active');
    el.style.color = '#ffe600';
    el.style.textShadow = '0 0 40px #ffe60088, 0 0 80px #ffe60044';
    gameState = 'racing';
  }
}

function checkFinish() {
  const done = cars.filter(c => c.finished);
  if (done.length > 0 && gameState === 'racing') {
    gameState = 'finished';
    // Determine winner
    let winner = done[0];
    if (done.length > 1) {
      winner = done[0].finishTime <= done[1].finishTime ? done[0] : done[1];
    }

    const resultEl = document.getElementById('result');
    const titleEl = document.getElementById('result-title');
    const detailEl = document.getElementById('result-detail');

    if (gameMode === 1) {
      if (winner.playerIdx === 0) {
        titleEl.textContent = 'YOU WIN!';
        titleEl.style.color = '#00f0ff';
      } else {
        titleEl.textContent = 'AI WINS';
        titleEl.style.color = '#ff6600';
      }
    } else {
      if (winner.playerIdx === 0) {
        titleEl.textContent = 'P1 WINS!';
        titleEl.style.color = '#00f0ff';
      } else {
        titleEl.textContent = 'P2 WINS!';
        titleEl.style.color = '#ff00e5';
      }
    }
    detailEl.textContent = `TIME: ${winner.finishTime.toFixed(1)}s`;
    resultEl.classList.add('active');
  }
}

function backToMenu() {
  gameState = 'menu';
  document.getElementById('menu').classList.remove('hidden');
  document.getElementById('hud').classList.remove('active');
  document.getElementById('result').classList.remove('active');
  document.getElementById('touch-controls').classList.remove('active');
  document.getElementById('countdown').classList.remove('active');
}

function restartGame() {
  document.getElementById('result').classList.remove('active');
  document.getElementById('hud').classList.remove('active');
  document.getElementById('touch-controls').classList.remove('active');
  document.getElementById('countdown').classList.remove('active');
  startGame(lastMode);
}

// --- Drawing ---
function drawTrack(ctx) {
  const n = trackPoints.length;

  // Outer edge glow
  ctx.strokeStyle = '#1a1a3a';
  ctx.lineWidth = trackWidth + 20;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(trackPoints[0].x, trackPoints[0].y);
  for (let i = 1; i < n; i++) ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
  ctx.closePath();
  ctx.stroke();

  // Track surface
  ctx.strokeStyle = '#222236';
  ctx.lineWidth = trackWidth;
  ctx.beginPath();
  ctx.moveTo(trackPoints[0].x, trackPoints[0].y);
  for (let i = 1; i < n; i++) ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
  ctx.closePath();
  ctx.stroke();

  // Center dashes
  ctx.setLineDash([20, 20]);
  ctx.strokeStyle = '#333355';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(trackPoints[0].x, trackPoints[0].y);
  for (let i = 1; i < n; i++) ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);

  // Edge lines (neon)
  for (let side = -1; side <= 1; side += 2) {
    ctx.strokeStyle = side === -1 ? '#00f0ff22' : '#ff00e522';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const i2 = (i + 1) % n;
      const dx = trackPoints[i2].x - trackPoints[i].x;
      const dy = trackPoints[i2].y - trackPoints[i].y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const nx = -dy / len * side * trackWidth * 0.48;
      const ny = dx / len * side * trackWidth * 0.48;
      if (i === 0) ctx.moveTo(trackPoints[i].x + nx, trackPoints[i].y + ny);
      else ctx.lineTo(trackPoints[i].x + nx, trackPoints[i].y + ny);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Start/finish line
  const sp = getTrackPoint(0);
  const sd = getTrackDir(0);
  ctx.save();
  ctx.translate(sp.x, sp.y);
  ctx.rotate(Math.atan2(sd.y, sd.x));
  const halfW = trackWidth * 0.48;
  const sqSize = 8;
  for (let r = 0; r < 2; r++) {
    for (let c = -Math.floor(halfW / sqSize); c <= Math.floor(halfW / sqSize); c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#fff' : '#000';
      ctx.globalAlpha = 0.5;
      ctx.fillRect(r * sqSize - sqSize, c * sqSize, sqSize, sqSize);
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawBackground(ctx, w, h) {
  // Grid lines
  ctx.strokeStyle = '#0f0f1a';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = 0; x < w; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (let y = 0; y < h; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // Subtle stars
  ctx.fillStyle = '#ffffff08';
  for (let i = 0; i < 40; i++) {
    const sx = (i * 137.5) % w;
    const sy = (i * 213.7) % h;
    ctx.beginPath();
    ctx.arc(sx, sy, 1, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- Collision ---
function carCollision(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const minDist = 28;
  if (dist < minDist && dist > 0) {
    const nx = dx / dist, ny = dy / dist;
    const overlap = (minDist - dist) / 2;
    a.x -= nx * overlap;
    a.y -= ny * overlap;
    b.x += nx * overlap;
    b.y += ny * overlap;
    // Bounce speeds
    const relSpeed = (a.speed - b.speed) * 0.3;
    a.speed -= relSpeed;
    b.speed += relSpeed;
  }
}

// --- Update HUD ---
function updateHUD() {
  document.getElementById('hud-p1-lap').textContent = `LAP ${Math.min(cars[0].lap + 1, totalLaps)}/${totalLaps}`;
  document.getElementById('hud-p2-lap').textContent = `LAP ${Math.min(cars[1].lap + 1, totalLaps)}/${totalLaps}`;
  document.getElementById('hud-time').textContent = raceTime.toFixed(1) + 's';
}

// --- Main Loop ---
let lastTime = 0;
const fixedDt = 1;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);

  if (gameState === 'menu') return;

  drawBackground(ctx, w, h);
  drawTrack(ctx);

  if (gameState === 'countdown') {
    countdownUpdate(1 / 60);
    cars.forEach(c => c.draw(ctx));
    return;
  }

  if (gameState === 'racing') {
    raceTime += 1 / 60;

    // Input
    applyInput(cars[0], 0);
    if (gameMode === 2) {
      applyInput(cars[1], 1);
    } else if (ai) {
      ai.update();
    }

    // Update
    cars.forEach(c => c.update(fixedDt));
    carCollision(cars[0], cars[1]);
    checkFinish();
  }

  // Draw
  cars.forEach(c => c.draw(ctx));
  updateHUD();
}

// --- Mini-map indicator dots on track edges for orientation ---

// --- Init ---
setupTouch();
requestAnimationFrame(gameLoop);
</script>
