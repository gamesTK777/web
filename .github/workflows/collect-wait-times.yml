name: TDS Wait Time Collector

on:
  schedule:
    # 毎時0分に1回トリガー → 各実行内で55分間ループ収集
    # 8:00-22:00 JST = 23:00-13:00 UTC
    - cron: '0 23 * * *'      # 23:00 UTC = 8:00 JST
    - cron: '0 0-13 * * *'    # 0:00-13:00 UTC = 9:00-22:00 JST
  workflow_dispatch:  # 手動実行も可能

concurrency:
  group: collect-wait-times
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Collect data in loop (~55 min)
        run: |
          # 1回のワークフロー実行で11回（5分間隔×55分）データ収集する
          # GitHub Actions cronの遅延・スキップ問題への対策
          ROUNDS=11
          INTERVAL=300  # 5分 = 300秒

          for i in $(seq 1 $ROUNDS); do
            echo ""
            echo "=========================================="
            echo "  Collection round $i/$ROUNDS ($(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M:%S JST'))"
            echo "=========================================="

            # データ収集
            cd DisneySea
            python scripts/collect.py
            cd ..

            # 変更があればcommit & push
            git add DisneySea/data/
            if ! git diff --staged --quiet; then
              git commit -m "📊 Update wait time data $(TZ=Asia/Tokyo date +%Y-%m-%d\ %H:%M)"

              # リトライ付きpush（同時実行によるコンフリクト対策）
              PUSH_OK=0
              for retry in 1 2 3; do
                if git pull --rebase origin main && git push; then
                  PUSH_OK=1
                  echo "✅ Push successful"
                  break
                fi
                echo "⚠️ Push failed, retrying ($retry/3)..."
                sleep 5
              done

              if [ $PUSH_OK -eq 0 ]; then
                echo "❌ Push failed after 3 retries, continuing to next round..."
              fi
            else
              echo "ℹ️ No new data to commit (duplicate or API error)"
            fi

            # 最終ラウンド以外はスリープ
            if [ $i -lt $ROUNDS ]; then
              echo "💤 Sleeping ${INTERVAL}s until next collection..."
              sleep $INTERVAL
            fi
          done

          echo ""
          echo "=========================================="
          echo "  All $ROUNDS rounds complete ($(TZ=Asia/Tokyo date +'%H:%M JST'))"
          echo "=========================================="
