<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❄️ アナ雪 神経衰弱 ❄️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Nunito:wght@400;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--card-w:94px;--card-h:132px;--gap:8px;}
body{font-family:'Nunito',sans-serif;min-height:100vh;
  background:radial-gradient(ellipse at 30% 0%,#0a2a5e 0%,#050e28 55%,#000310 100%);
  color:#fff;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;padding-bottom:40px;user-select:none;}

/* Stars */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite;opacity:0;}
@keyframes twinkle{0%,100%{opacity:0;}50%{opacity:var(--o,.8);}}
.flake{position:fixed;pointer-events:none;z-index:1;color:rgba(180,230,255,.18);
  animation:flakefall var(--fd,12s) linear infinite;font-size:var(--fs,1.2rem);}
@keyframes flakefall{0%{transform:translateY(-5vh) translateX(0) rotate(0);}
  100%{transform:translateY(110vh) translateX(var(--fx,20px)) rotate(360deg);}}

/* Header */
header{position:relative;z-index:10;width:100%;text-align:center;padding:18px 14px 12px;}
.hdr-icon{font-size:2.4rem;display:block;margin-bottom:2px;
  animation:hglow 2.5s ease-in-out infinite;}
@keyframes hglow{0%,100%{filter:drop-shadow(0 0 6px #a5d8ff);}
  50%{filter:drop-shadow(0 0 22px #a5d8ff) drop-shadow(0 0 50px rgba(100,180,255,.4));}}
h1{font-family:'Cinzel',serif;font-size:1.55rem;font-weight:700;letter-spacing:3px;
  background:linear-gradient(180deg,#e0f4ff 0%,#a5d8ff 45%,#5bb0e8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 1px 6px rgba(100,180,255,.5));}
.subtitle{font-size:.7rem;letter-spacing:4px;color:rgba(165,216,255,.5);
  font-family:'Cinzel',serif;margin-top:1px;}

/* Diff tabs */
.diff-tabs{display:flex;justify-content:center;gap:7px;margin:10px 0 12px;}
.diff-tab{padding:5px 15px;border:1.5px solid rgba(165,216,255,.3);border-radius:30px;
  font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:800;cursor:pointer;
  transition:all .18s;background:rgba(255,255,255,.04);color:rgba(165,216,255,.7);}
.diff-tab:hover{background:rgba(165,216,255,.12);border-color:rgba(165,216,255,.6);}
.diff-tab.active{background:linear-gradient(135deg,#5bb0e8,#2980b9);
  border-color:transparent;color:#fff;box-shadow:0 3px 14px rgba(91,176,232,.45);}

/* ── PLAYER PANELS ── */
.players-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:0 0 12px;}
.player-panel{
  background:rgba(255,255,255,.06);border:2px solid rgba(165,216,255,.2);
  border-radius:18px;padding:10px 18px;min-width:140px;text-align:center;
  transition:all .3s;cursor:pointer;position:relative;}
.player-panel.active{
  background:rgba(91,176,232,.18);border-color:#5bb0e8;
  box-shadow:0 0 24px rgba(91,176,232,.4),inset 0 0 20px rgba(91,176,232,.1);}
.player-panel.active::after{
  content:'▼ あなたのターン！';position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-size:.68rem;font-weight:900;color:#5bb0e8;white-space:nowrap;
  animation:turnPulse 1s ease-in-out infinite;}
@keyframes turnPulse{0%,100%{opacity:.7;}50%{opacity:1;}}
.p-name{font-size:.85rem;font-weight:900;color:#e0f4ff;margin-bottom:4px;
  display:flex;align-items:center;justify-content:center;gap:5px;}
.p-name input{background:none;border:none;border-bottom:1px solid rgba(165,216,255,.4);
  color:#e0f4ff;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:900;
  width:90px;text-align:center;outline:none;padding:1px 2px;}
.p-name input:focus{border-bottom-color:#5bb0e8;}
.p-score-row{font-size:1.3rem;font-weight:900;color:#5bb0e8;line-height:1;}
.p-score-label{font-size:.68rem;color:rgba(165,216,255,.6);margin-top:1px;}

.vs-badge{
  font-family:'Cinzel',serif;font-size:1rem;font-weight:700;
  color:rgba(165,216,255,.5);width:32px;text-align:center;}

/* Status */
.status-bar{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.stat{background:rgba(255,255,255,.06);border:1px solid rgba(165,216,255,.2);
  border-radius:20px;padding:4px 14px;font-size:.85rem;font-weight:700;
  color:#a5d8ff;min-width:80px;text-align:center;}

#reset-btn{display:block;margin:8px auto 0;padding:7px 26px;
  border:1.5px solid rgba(165,216,255,.4);border-radius:30px;
  background:rgba(165,216,255,.08);color:#a5d8ff;
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;
  cursor:pointer;transition:all .18s;letter-spacing:.8px;}
#reset-btn:hover{background:rgba(165,216,255,.18);transform:translateY(-2px);}

/* Board */
#board-wrap{position:relative;z-index:5;margin:18px auto 0;padding:0 10px;width:100%;max-width:960px;}
#board{display:grid;gap:var(--gap);justify-content:center;}

/* Cards */
.card{width:var(--card-w);height:var(--card-h);perspective:700px;cursor:pointer;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,.2,.2,1);border-radius:12px;}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;overflow:hidden;}
.card-back{background:linear-gradient(145deg,#0c2a5a,#1a4a8a,#0c2a5a);
  border:2px solid rgba(165,216,255,.35);
  box-shadow:0 4px 16px rgba(0,0,0,.6),inset 0 0 30px rgba(10,60,120,.4);}
.card-front{transform:rotateY(180deg);border:2px solid rgba(165,216,255,.5);
  box-shadow:0 4px 16px rgba(0,0,0,.5);}
.card-front svg{width:100%;height:100%;display:block;}
.card.matched .card-front{border-color:#a5d8ff;
  box-shadow:0 0 22px rgba(165,216,255,.7),0 0 50px rgba(165,216,255,.2);
  animation:matchPop .5s ease-out;}
@keyframes matchPop{0%{transform:rotateY(180deg) scale(.92);}55%{transform:rotateY(180deg) scale(1.1);}100%{transform:rotateY(180deg) scale(1);}}
.card.wrong .card-front{border-color:#ff7070;animation:wrongFlash .5s;}
@keyframes wrongFlash{0%,100%{}50%{filter:brightness(1.4) saturate(1.5);}}
.card:not(.flipped):not(.matched):hover .card-inner{
  transform:rotateY(12deg) translateY(-5px);
  filter:drop-shadow(0 10px 20px rgba(165,216,255,.25));}

/* Praise popup */
#praise-popup{position:fixed;inset:0;z-index:8000;display:none;
  align-items:center;justify-content:center;pointer-events:none;}
#praise-popup.show{display:flex;}
.praise-inner{position:relative;display:flex;flex-direction:column;align-items:center;
  animation:praiseIn .4s cubic-bezier(.3,.8,.4,1.4);}
@keyframes praiseIn{0%{transform:scale(0) translateY(40px);opacity:0;}100%{transform:scale(1) translateY(0);opacity:1;}}
.praise-char-wrap{width:130px;height:165px;
  filter:drop-shadow(0 0 22px rgba(165,216,255,.9)) drop-shadow(0 0 50px rgba(165,216,255,.35));}
.praise-char-wrap svg{width:100%;height:100%;}
.speech-bbl{background:rgba(5,20,60,.92);border:2px solid rgba(165,216,255,.7);
  border-radius:18px;padding:9px 20px;margin-top:-8px;
  font-size:1.2rem;font-weight:900;color:#e0f4ff;text-align:center;letter-spacing:1px;
  box-shadow:0 0 18px rgba(165,216,255,.25);}
.speech-bbl::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  border-left:10px solid transparent;border-right:10px solid transparent;
  border-bottom:10px solid rgba(165,216,255,.7);}
.praise-snow{position:absolute;pointer-events:none;animation:praiseSnow .85s ease-out forwards;}
@keyframes praiseSnow{0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--px),var(--py)) scale(.3);opacity:0;}}
.ice-chip{position:fixed;pointer-events:none;z-index:7999;
  animation:icefall 1.2s ease-out forwards;}
@keyframes icefall{0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1;}
  100%{transform:translate(var(--ix),var(--iy)) rotate(var(--ir,360deg)) scale(.2);opacity:0;}}

/* Win overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,5,25,.78);
  z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
#overlay.show{display:flex;}
.ov-card{background:linear-gradient(160deg,#040e30,#091e52);
  border:2px solid rgba(165,216,255,.45);border-radius:26px;
  padding:40px 50px;text-align:center;max-width:92vw;
  box-shadow:0 0 80px rgba(165,216,255,.12),0 30px 80px rgba(0,0,0,.6);
  animation:bounceIn .5s;}
@keyframes bounceIn{0%{transform:scale(.4);opacity:0;}70%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
.ov-card .big{font-size:3.8rem;margin-bottom:6px;}
.ov-card h2{font-family:'Cinzel',serif;font-size:1.7rem;font-weight:700;margin-bottom:6px;
  background:linear-gradient(180deg,#e0f4ff,#a5d8ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ov-scores{display:flex;gap:20px;justify-content:center;margin:12px 0 20px;}
.ov-pcard{background:rgba(255,255,255,.07);border-radius:14px;padding:10px 20px;
  border:1.5px solid rgba(165,216,255,.3);}
.ov-pcard.winner{border-color:#f5c842;box-shadow:0 0 20px rgba(245,200,66,.3);}
.ov-pcard .ov-pn{font-size:.85rem;color:rgba(165,216,255,.7);margin-bottom:4px;}
.ov-pcard .ov-ps{font-size:1.8rem;font-weight:900;color:#5bb0e8;}
.ov-pcard.winner .ov-ps{color:#f5c842;}
.ov-btn{padding:10px 30px;border:1.5px solid rgba(165,216,255,.5);border-radius:30px;
  background:rgba(165,216,255,.1);color:#a5d8ff;font-family:'Nunito',sans-serif;
  font-size:.92rem;font-weight:800;cursor:pointer;transition:all .18s;letter-spacing:.8px;}
.ov-btn:hover{background:rgba(165,216,255,.22);transform:translateY(-2px);}

.conf{position:fixed;pointer-events:none;z-index:10000;
  animation:cfall var(--cd,3s) ease-in forwards;}
@keyframes cfall{0%{transform:translateY(-30px) rotate(0);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

@media(max-width:640px){:root{--card-w:68px;--card-h:95px;--gap:6px;}
  .player-panel{min-width:110px;padding:8px 10px;}}
@media(max-width:400px){:root{--card-w:56px;--card-h:78px;--gap:4px;}
  .player-panel{min-width:90px;}}
</style>
</head>
<body>
<div id="stars"></div>

<script>
// Stars
const sb=document.getElementById('stars');
for(let i=0;i<180;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2.5+.8;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${2+Math.random()*5}s;--o:${.3+Math.random()*.7};animation-delay:${-Math.random()*5}s;`;
  sb.appendChild(s);
}
for(let i=0;i<20;i++){
  const el=document.createElement('div');el.className='flake';
  el.textContent=['❄','❅','❆','✦','*'][Math.floor(Math.random()*5)];
  el.style.cssText=`left:${Math.random()*100}vw;--fd:${8+Math.random()*14}s;--fs:${.7+Math.random()*1.3}rem;--fx:${(Math.random()-.5)*60}px;animation-delay:${-Math.random()*14}s;`;
  document.body.appendChild(el);
}
</script>

<header>
  <span class="hdr-icon">❄️</span>
  <h1>FROZEN MEMORY</h1>
  <div class="subtitle">～ アナ雪 神経衰弱 対戦版 ～</div>
  <div class="diff-tabs">
    <button class="diff-tab active" onclick="setDiff('easy')">⭐ やさしい (6ペア)</button>
    <button class="diff-tab" onclick="setDiff('medium')">🌟 ふつう (10ペア)</button>
    <button class="diff-tab" onclick="setDiff('hard')">💎 むずかしい (18ペア)</button>
  </div>

  <!-- 2-Player panels -->
  <div class="players-row">
    <div class="player-panel active" id="p1-panel">
      <div class="p-name">🩵 <input type="text" id="p1-name" value="プレイヤー1" maxlength="8"></div>
      <div class="p-score-row"><span id="p1-score">0</span></div>
      <div class="p-score-label">ペア獲得</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="player-panel" id="p2-panel">
      <div class="p-name">💜 <input type="text" id="p2-name" value="プレイヤー2" maxlength="8"></div>
      <div class="p-score-row"><span id="p2-score">0</span></div>
      <div class="p-score-label">ペア獲得</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="stat">🃏 ペア: <span id="s-pairs">0</span>/<span id="s-total">0</span></div>
    <div class="stat">⏱️ <span id="s-time">0:00</span></div>
    <div class="stat">✋ 手数: <span id="s-moves">0</span></div>
  </div>
  <button id="reset-btn" onclick="newGame()">❄️ はじめから ❄️</button>
</header>

<div id="board-wrap"><div id="board"></div></div>

<!-- Praise popup -->
<div id="praise-popup">
  <div class="praise-inner" id="praise-inner">
    <div class="praise-char-wrap" id="praise-svg"></div>
    <div style="position:relative">
      <div class="speech-bbl" id="praise-text"></div>
    </div>
  </div>
</div>

<!-- Win overlay -->
<div id="overlay">
  <div class="ov-card">
    <div class="big" id="ov-icon">🏆</div>
    <h2 id="ov-title">ゲーム終了！</h2>
    <div class="ov-scores">
      <div class="ov-pcard" id="ov-p1c">
        <div class="ov-pn" id="ov-p1n">プレイヤー1</div>
        <div class="ov-ps"><span id="ov-p1s">0</span> ペア</div>
      </div>
      <div class="ov-pcard" id="ov-p2c">
        <div class="ov-pn" id="ov-p2n">プレイヤー2</div>
        <div class="ov-ps"><span id="ov-p2s">0</span> ペア</div>
      </div>
    </div>
    <button class="ov-btn" onclick="newGame();document.getElementById('overlay').classList.remove('show')">❄️ もう一度あそぶ</button>
  </div>
</div>

<script>
// ============================================================
//   CHARACTER SVG DEFINITIONS
// ============================================================

// Helper: base label band
function lbl(name){
  return `<rect x="4" y="101" width="72" height="8" rx="3" fill="rgba(0,0,0,.35)"/>
  <text x="40" y="107.5" font-size="5.5" text-anchor="middle" fill="rgba(255,255,255,.92)" font-family="Nunito,sans-serif" font-weight="700">${name}</text>`;
}
// Helper: linear gradient defs
function bgdef(uid,c1,c2){
  return `<defs><linearGradient id="bg${uid}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs>`;
}
// Helper: bg rect
function bgrect(uid){ return `<rect width="80" height="110" fill="url(#bg${uid})" rx="10"/>`; }
// Helper: corner snowflakes
function corners(op=.12){
  return `<text x="5" y="18" font-size="9" fill="rgba(255,255,255,${op})" font-family="Arial">❄</text>
  <text x="64" y="15" font-size="7" fill="rgba(255,255,255,${op*.8})" font-family="Arial">❄</text>
  <text x="5" y="102" font-size="7" fill="rgba(255,255,255,${op*.8})" font-family="Arial">❄</text>
  <text x="65" y="104" font-size="9" fill="rgba(255,255,255,${op})" font-family="Arial">❄</text>`;
}
// Helper: human face
function face(opts){
  const {skin='#ffe9d5',skin2='#ffd5b0',uid,eyes='#5bb0e8',brow='#a06010',blush=true,lx=33,rx=47,ey=51,wink=false,smile='M34 65 Q40 70 46 65'} = opts;
  const leftEyeArt = wink
    ? `<path d="M29 ${ey} Q33 ${ey-3} 37 ${ey}" stroke="${brow}" stroke-width="1.8" fill="none" stroke-linecap="round"/>`
    : `<ellipse cx="${lx}" cy="${ey}" rx="4" ry="4.5" fill="white"/>
       <circle cx="${lx+.5}" cy="${ey+.5}" r="3" fill="${eyes}"/>
       <circle cx="${lx+.5}" cy="${ey+.5}" r="1.7" fill="#111"/>
       <circle cx="${lx+1.5}" cy="${ey-.5}" r=".85" fill="rgba(255,255,255,.9)"/>`;
  return `<defs><radialGradient id="sk${uid}" cx="48%" cy="38%" r="58%">
    <stop offset="0%" stop-color="${skin}"/><stop offset="100%" stop-color="${skin2}"/></radialGradient></defs>
  <!-- Neck --><rect x="35" y="66" width="10" height="12" fill="url(#sk${uid})" rx="3"/>
  <!-- Head --><ellipse cx="40" cy="52" rx="18" ry="20" fill="url(#sk${uid})"/>
  <!-- Ears --><ellipse cx="22" cy="53" rx="3" ry="4" fill="url(#sk${uid})"/>
  <ellipse cx="58" cy="53" rx="3" ry="4" fill="url(#sk${uid})"/>
  <!-- Eyes -->${leftEyeArt}
  <ellipse cx="${rx}" cy="${ey}" rx="4" ry="4.5" fill="white"/>
  <circle cx="${rx+.5}" cy="${ey+.5}" r="3" fill="${eyes}"/>
  <circle cx="${rx+.5}" cy="${ey+.5}" r="1.7" fill="#111"/>
  <circle cx="${rx+1.5}" cy="${ey-.5}" r=".85" fill="rgba(255,255,255,.9)"/>
  <!-- Brows --><path d="M28.5 45 Q33 42.5 37 44.5" stroke="${brow}" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M43 44.5 Q47 42.5 51.5 45" stroke="${brow}" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Nose --><ellipse cx="40" cy="59" rx="2" ry="1.5" fill="rgba(200,110,90,.33)"/>
  ${blush?`<ellipse cx="27" cy="60" rx="5.5" ry="3" fill="rgba(255,150,150,.22)"/>
  <ellipse cx="53" cy="60" rx="5.5" ry="3" fill="rgba(255,150,150,.22)"/>` : ''}
  <!-- Mouth --><path d="${smile}" stroke="#c06055" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="${smile}" stroke="rgba(255,180,170,.3)" stroke-width="3.5" fill="none" stroke-linecap="round"/>`;
}

// ─────── 18 CHARACTER SVGs ───────
function charSVG(c, uid) {
  switch(c.id) {
// ① エルサ
case 'elsa': return `<svg viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg">
  ${bgdef(uid,'#0d3b6e','#1a7abf')}${bgrect(uid)}${corners()}
  <!-- Dress --><path d="M26 78 Q40 100 54 78 Q54 94 40 106 Q26 94 26 78Z" fill="rgba(130,195,235,.55)"/>
  <ellipse cx="40" cy="98" rx="22" ry="14" fill="rgba(150,210,240,.45)"/>
  <!-- Braid --><path d="M20 60 Q13 76 17 100" stroke="#c8a820" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M20 60 Q13 76 17 100" stroke="#e8c840" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M20 60 Q13 76 17 100" stroke="rgba(255,245,140,.4)" stroke-width="3" fill="none" stroke-dasharray="5,4" stroke-linecap="round"/>
  <!-- Hair back --><ellipse cx="40" cy="50" rx="21" ry="23" fill="#d8d080"/>
  ${face({uid,skin:'#ffe9d5',skin2:'#ffd5b0',eyes:'#5bb0e8',brow:'#909030',smile:'M34 65 Q40 70 46 65'})}
  <!-- Hair front --><path d="M22 43 Q25 27 40 26 Q55 27 58 43 Q52 33 40 32 Q28 33 22 43Z" fill="#d8d080"/>
  <!-- Updo bun --><ellipse cx="40" cy="29" rx="11" ry="9" fill="#d0c878"/>
  <path d="M29 36 Q27 50 28 57" stroke="#d0c878" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Crown --><path d="M23 37 L27 29 L31 37 L36 24 L40 35 L44 24 L49 37 L53 29 L57 37" stroke="#f5d060" stroke-width="2.2" fill="none" stroke-linejoin="round"/>
  <circle cx="36" cy="24" r="2" fill="#f5d060"/><circle cx="44" cy="24" r="2" fill="#f5d060"/>
  ${lbl('❄ エルサ')}</svg>`;

// ② アナ
case 'anna': return `<svg viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg">
  ${bgdef(uid,'#1a4a2e','#2e8a50')}${bgrect(uid)}${corners()}
  <!-- Dress --><path d="M22 76 Q40 100 58 76 Q58 94 40 108 Q22 94 22 76Z" fill="rgba(200,80,100,.55)"/>
  <ellipse cx="40" cy="98" rx="24" ry="15" fill="rgba(160,60,80,.45)"/>
  <!-- Cape/wrap --><path d="M18 68 Q20 85 40 90 Q60 85 62 68" fill="rgba(80,160,100,.4)" stroke="rgba(100,200,120,.5)" stroke-width="1"/>

  <text x="60" y="22" font-size="9" fill="rgba(165,216,255,.28)" font-family="Arial">❄</text>
  <text x="10" y="104" font-size="9" fill="rgba(165,216,255,.28)" font-family="Arial">❄</text>
  <text x="60" y="104" font-size="11" fill="rgba(165,216,255,.35)" font-family="Arial">❄</text>
</svg>`;

// ============================================================
//   GAME DATA & STATE
// ============================================================
const ALL_CHARS = [
  {id:'elsa'},{id:'anna'},{id:'olaf'},{id:'kristoff'},{id:'sven'},{id:'hans'},
  {id:'marshmallow'},{id:'pabbie'},{id:'bruni'},{id:'nokk'},
  {id:'honeymaren'},{id:'ryder'},{id:'iduna'},{id:'agnarr'},
  {id:'mattias'},{id:'gale'},{id:'giant'},{id:'troll'},
];
const DIFFS = {easy:{pairs:6,cols:4},medium:{pairs:10,cols:5},hard:{pairs:18,cols:6}};
const PRAISE = [
  '✨ すごーい！','❄ やったね！','💙 おみごと！','🌟 さいこう！',
  '👑 えらい！','❅ ペアみっけ！','💫 その調子！','🎉 すばらしい！',
  '⭐ かんぺき！','❄ さすが！','✦ 天才！','💎 よくできました！',
];

let diff='easy', cards=[], flipped=[], matched=0, moves=0;
let seconds=0, timer=null, canFlip=true, gameStarted=false;
let currentPlayer=0, scores=[0,0];
let praiseTimer=null;

// ── Diff ──
function setDiff(d){
  diff=d;
  document.querySelectorAll('.diff-tab').forEach((b,i)=>
    b.classList.toggle('active',['easy','medium','hard'][i]===d));
  newGame();
}

// ── New Game ──
function newGame(){
  clearInterval(timer);
  matched=0;moves=0;seconds=0;flipped=[];canFlip=true;gameStarted=false;
  currentPlayer=0;scores=[0,0];
  updatePlayerUI();
  document.getElementById('s-moves').textContent='0';
  document.getElementById('s-time').textContent='0:00';
  document.getElementById('s-pairs').textContent='0';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('praise-popup').classList.remove('show');
  const {pairs,cols}=DIFFS[diff];
  document.getElementById('s-total').textContent=pairs;
  const pool=[...ALL_CHARS].sort(()=>Math.random()-.5).slice(0,pairs);
  const deck=[...pool,...pool].sort(()=>Math.random()-.5);
  cards=deck.map((c,i)=>({...c,id:c.id,cardIdx:i,matched:false,flipped:false}));
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${cols},var(--card-w))`;
  board.innerHTML='';
  cards.forEach((c,i)=>board.appendChild(createCardEl(c,i)));
}

// ── Card element ──
function createCardEl(c, idx){
  const el=document.createElement('div');
  el.className='card';el.id=`card-${idx}`;
  const backFace=document.createElement('div');backFace.className='card-face card-back';
  backFace.innerHTML=BACK_SVG;
  const frontFace=document.createElement('div');frontFace.className='card-face card-front';
  frontFace.innerHTML=charSVG(c, idx);
  const inner=document.createElement('div');inner.className='card-inner';
  inner.appendChild(backFace);inner.appendChild(frontFace);
  el.appendChild(inner);
  el.addEventListener('click',()=>flipCard(idx));
  return el;
}

// ── Flip ──
function flipCard(idx){
  if(!canFlip)return;
  const c=cards[idx];
  if(c.matched||c.flipped)return;
  if(flipped.length>=2)return;
  if(!gameStarted){
    gameStarted=true;
    timer=setInterval(()=>{seconds++;updateTimer();},1000);
  }
  c.flipped=true;
  document.getElementById(`card-${idx}`).classList.add('flipped');
  flipped.push(idx);
  if(flipped.length===2){
    moves++;
    document.getElementById('s-moves').textContent=moves;
    canFlip=false;
    setTimeout(checkMatch,750);
  }
}

// ── Match check ──
function checkMatch(){
  const [a,b]=flipped;
  const ca=cards[a],cb=cards[b];
  if(ca.id===cb.id){
    ca.matched=cb.matched=true;matched++;
    document.getElementById('s-pairs').textContent=matched;
    document.getElementById(`card-${a}`).classList.add('matched');
    document.getElementById(`card-${b}`).classList.add('matched');
    scores[currentPlayer]++;
    updatePlayerUI();
    burstIce(a);burstIce(b);
    flipped=[];canFlip=true;
    showPraise();
    if(matched===DIFFS[diff].pairs) setTimeout(winGame,500);
    // Keep same player's turn on match
  } else {
    document.getElementById(`card-${a}`).classList.add('wrong');
    document.getElementById(`card-${b}`).classList.add('wrong');
    setTimeout(()=>{
      [a,b].forEach(i=>{
        cards[i].flipped=false;
        document.getElementById(`card-${i}`).classList.remove('flipped','wrong');
      });
      flipped=[];canFlip=true;
      currentPlayer=1-currentPlayer; // switch turn
      updatePlayerUI();
    },680);
  }
}

// ── Player UI ──
function updatePlayerUI(){
  document.getElementById('p1-score').textContent=scores[0];
  document.getElementById('p2-score').textContent=scores[1];
  document.getElementById('p1-panel').classList.toggle('active',currentPlayer===0);
  document.getElementById('p2-panel').classList.toggle('active',currentPlayer===1);
}

// ── Praise popup ──
function showPraise(){
  clearTimeout(praiseTimer);
  const popup=document.getElementById('praise-popup');
  const msg=PRAISE[Math.floor(Math.random()*PRAISE.length)];
  const pname=document.getElementById(currentPlayer===0?'p1-name':'p2-name').value||`プレイヤー${currentPlayer+1}`;
  document.getElementById('praise-svg').innerHTML=PRAISE_SVG;
  document.getElementById('praise-text').textContent=`${pname}、${msg}`;
  const inner=document.getElementById('praise-inner');
  inner.querySelectorAll('.praise-snow').forEach(x=>x.remove());
  const fc=['❄','❅','❆','✦','⭐','💙'];
  for(let i=0;i<12;i++){
    const s=document.createElement('div');s.className='praise-snow';
    const ang=Math.random()*Math.PI*2,dist=55+Math.random()*75;
    s.textContent=fc[Math.floor(Math.random()*fc.length)];
    s.style.cssText=`position:absolute;top:50%;left:50%;font-size:${.8+Math.random()*1}rem;color:rgba(165,216,255,.9);--px:${Math.cos(ang)*dist}px;--py:${Math.sin(ang)*dist}px;animation-delay:${i*.04}s;`;
    inner.appendChild(s);
  }
  popup.classList.add('show');
  praiseTimer=setTimeout(()=>popup.classList.remove('show'),1700);
}

// ── Ice burst ──
function burstIce(idx){
  const el=document.getElementById(`card-${idx}`);
  if(!el)return;
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const chips=['❄','❅','❆','✦','💙','⭐'];
  for(let i=0;i<8;i++){
    const c=document.createElement('div');c.className='ice-chip';
    const ang=Math.random()*Math.PI*2,dist=50+Math.random()*70;
    c.textContent=chips[Math.floor(Math.random()*chips.length)];
    c.style.cssText=`left:${cx}px;top:${cy}px;font-size:${.7+Math.random()*.8}rem;color:rgba(165,216,255,.85);--ix:${Math.cos(ang)*dist}px;--iy:${Math.sin(ang)*dist}px;--ir:${(Math.random()-.5)*720}deg;animation-delay:${i*.04}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1400);
  }
}

// ── Timer ──
function updateTimer(){
  const m=Math.floor(seconds/60),s=seconds%60;
  document.getElementById('s-time').textContent=`${m}:${s.toString().padStart(2,'0')}`;
}

// ── Win ──
function winGame(){
  clearInterval(timer);
  const [s0,s1]=[scores[0],scores[1]];
  const pn0=document.getElementById('p1-name').value||'プレイヤー1';
  const pn1=document.getElementById('p2-name').value||'プレイヤー2';
  let icon,title;
  if(s0>s1){icon='🏆';title=`${pn0} の勝ち！🎉`;}
  else if(s1>s0){icon='🏆';title=`${pn1} の勝ち！🎉`;}
  else{icon='🤝';title='引き分け！すごい！';}
  document.getElementById('ov-icon').textContent=icon;
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-p1n').textContent=pn0;
  document.getElementById('ov-p2n').textContent=pn1;
  document.getElementById('ov-p1s').textContent=s0;
  document.getElementById('ov-p2s').textContent=s1;
  const p1c=document.getElementById('ov-p1c');
  const p2c=document.getElementById('ov-p2c');
  p1c.classList.toggle('winner',s0>s1);
  p2c.classList.toggle('winner',s1>s0);
  if(s0===s1){p1c.classList.add('winner');p2c.classList.add('winner');}
  document.getElementById('overlay').classList.add('show');
  launchConfetti();
}

// ── Confetti ──
function launchConfetti(){
  const cols=['#a5d8ff','#fff','#5bb0e8','#f5c842','#c080e8','#60d8c0','#ffb3c1'];
  const emjs=['❄','❅','❆','✦','⭐','💙','🌟'];
  for(let i=0;i<65;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='conf';
      if(Math.random()>.4){el.textContent=emjs[Math.floor(Math.random()*emjs.length)];el.style.fontSize=(.8+Math.random()*.9)+'rem';}
      else{const sz=7+Math.random()*8;el.style.cssText+=`width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'3px'};`;}
      el.style.left=Math.random()*100+'vw';el.style.top='-25px';
      el.style.cssText+=`--cd:${2+Math.random()*2.5}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),5000);
    },i*52);
  }
}

document.addEventListener('keydown',e=>{if(e.key==='r'||e.key==='R')newGame();});
newGame();
</script>
