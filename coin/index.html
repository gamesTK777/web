<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>コイン落としゲーム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060610;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Arial', sans-serif;
      user-select: none;
      overflow: hidden;
      touch-action: none;
    }
    #wrapper {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: min(100vw, 620px);
    }
    #topBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(0,0,0,0.7);
      border-radius: 12px 12px 0 0;
      border: 1px solid #2a2a4a;
      border-bottom: none;
    }
    .stat { text-align: center; }
    .stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value {
      font-size: clamp(18px, 5vw, 28px);
      font-weight: bold;
      color: #FFD700;
      text-shadow: 0 0 12px rgba(255,215,0,0.7);
    }
    canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
      width: 100%;
      height: auto;
      border-left: 1px solid #2a2a4a;
      border-right: 1px solid #2a2a4a;
    }
    #bottomBar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 8px;
      background: rgba(0,0,0,0.7);
      border-radius: 0 0 12px 12px;
      border: 1px solid #2a2a4a;
      border-top: none;
    }
    button {
      background: linear-gradient(to bottom, #FFE04A, #FFA000);
      border: none;
      padding: 10px 22px;
      font-size: clamp(12px, 3.5vw, 14px);
      font-weight: bold;
      cursor: pointer;
      border-radius: 20px;
      color: #3a1800;
      box-shadow: 0 3px 10px rgba(255,160,0,0.5);
      transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: translateY(1px); }
    #hint { color: #666; font-size: clamp(10px, 3vw, 12px); }
  </style>
</head>
<body>
<div id="wrapper">
  <div id="topBar">
    <div class="stat">
      <div class="stat-label">スコア</div>
      <div class="stat-value" id="scoreEl">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">手持ちコイン</div>
      <div class="stat-value" id="playerEl">30</div>
    </div>
    <div class="stat">
      <div class="stat-label">獲得コイン</div>
      <div class="stat-value" id="earnedEl">0</div>
    </div>
  </div>
  <canvas id="c" width="620" height="510"></canvas>
  <div id="bottomBar">
    <span id="hint">台をタップ／クリックしてコインを投入</span>
    <button id="refillBtn">コイン補充 (+20)</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const scoreEl  = document.getElementById('scoreEl');
const playerEl = document.getElementById('playerEl');
const earnedEl = document.getElementById('earnedEl');

const W = 620, H = 510;

// ── Physics (game-space) ───────────────────────────────────────────
const PL = 55,  PR = 565;   // left/right walls
const PT = 90,  PB = 430;   // back/front walls
const PUSHER_H   = 28;
const PUSHER_MIN = 205, PUSHER_MAX = 345, PUSHER_SPD = 0.72;
let   pusherY = 225, pusherDir = 1;

const GRAVITY = 0.36, BOUNCE = 0.22, FRICTION = 0.91, COIN_R = 12;

// ── Perspective display constants ─────────────────────────────────
// Platform appears as a trapezoid: narrow at back (top of screen), wide at front
const D = {
  backY:     190,   // back edge screen-Y
  frontY:    410,   // front edge screen-Y
  backLeft:  172,   // back-left corner X
  backRight: 448,   // back-right corner X
  frontLeft:  46,   // front-left corner X
  frontRight: 574,  // front-right corner X
  faceH:      36,   // front-face height (below frontY)
  headerH:    76,   // cabinet header height
};

// Game coords → screen coords
function proj(gx, gy) {
  const t = Math.max(0, Math.min(1, (gy - PT) / (PB - PT)));
  const sy    = D.backY + t * (D.frontY - D.backY);
  const left  = D.backLeft  + t * (D.frontLeft  - D.backLeft);
  const right = D.backRight + t * (D.frontRight - D.backRight);
  return [left + ((gx - PL) / (PR - PL)) * (right - left), sy];
}

// Visual scale at a given game-Y depth (back=small, front=large)
function dscale(gy) {
  return 0.48 + 0.52 * Math.max(0, Math.min(1, (gy - PT) / (PB - PT)));
}

// Screen X → game X (projected at back edge – used for coin entry)
function dropGX(sx) {
  const nx = (sx - D.backLeft) / (D.backRight - D.backLeft);
  return PL + Math.max(0, Math.min(1, nx)) * (PR - PL);
}

// ── State ─────────────────────────────────────────────────────────
let score = 0, playerCoins = 30, earnedCoins = 0;
let coins = [], particles = [], texts = [];
let mouseX = W / 2, mouseY = D.backY, inDrop = false;
let dropCD = 0, frame = 0;

// ── Audio ─────────────────────────────────────────────────────────
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(f1, f2, dur, vol = 0.07) {
  try {
    const a = getAC(), o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(f1, a.currentTime);
    o.frequency.exponentialRampToValueAtTime(f2, a.currentTime + dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(a.currentTime); o.stop(a.currentTime + dur + 0.02);
  } catch(e) {}
}
const playDrop    = () => beep(280, 140, 0.06, 0.06);
const playCollect = () => beep(520 + Math.random()*280, 920 + Math.random()*380, 0.13, 0.08);

// ── Particle ──────────────────────────────────────────────────────
class Particle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 7;
    this.vy = -Math.random() * 5 - 2;
    this.r  = 2 + Math.random() * 3;
    this.life = 1;
    this.hue  = 35 + Math.random() * 50;
  }
  update() { this.vy += 0.22; this.x += this.vx; this.y += this.vy; this.life -= 0.025; }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${this.hue},100%,65%)`;
    ctx.fill();
    ctx.restore();
  }
}

// ── Floating Text ─────────────────────────────────────────────────
class FText {
  constructor(x, y, txt, col = '#FFD700') {
    this.x = x; this.y = y; this.txt = txt; this.col = col;
    this.vy = -2.2; this.life = 1;
  }
  update() { this.y += this.vy; this.vy *= 0.95; this.life -= 0.022; }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.col; ctx.shadowColor = this.col; ctx.shadowBlur = 8;
    ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
    ctx.fillText(this.txt, this.x, this.y);
    ctx.restore();
  }
}

// ── Coin ──────────────────────────────────────────────────────────
class Coin {
  constructor(gx, gy, vx = 0, vy = 2) {
    this.x  = gx; this.y  = gy;
    this.vx = vx + (Math.random() - 0.5) * 0.4;
    this.vy = vy;
    this.r  = COIN_R; this.alive = true;
    this.angle = Math.random() * Math.PI * 2;
    this.spin  = (Math.random() - 0.5) * 0.08;
    this.hue   = 38 + Math.random() * 28;
    this.lit   = 52 + Math.random() * 16;
  }

  update() {
    if (!this.alive) return;
    this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
    this.angle += this.spin; this.vx *= FRICTION;

    if (this.x - this.r < PL) { this.x = PL + this.r; this.vx =  Math.abs(this.vx) * BOUNCE + 0.1; }
    if (this.x + this.r > PR) { this.x = PR - this.r; this.vx = -Math.abs(this.vx) * BOUNCE - 0.1; }
    if (this.y - this.r < PT) { this.y = PT + this.r; this.vy =  Math.abs(this.vy) * BOUNCE; }

    if (this.y + this.r > PB) {
      this.alive = false;
      score++; earnedCoins++;
      scoreEl.textContent = score; earnedEl.textContent = earnedCoins;
      const [px, py] = proj(this.x, PB);
      for (let i = 0; i < 14; i++) particles.push(new Particle(px, py));
      texts.push(new FText(px, py - 18, '+1'));
      playCollect();
      return;
    }
    this.pusherCol();
  }

  pusherCol() {
    const cx = Math.max(PL, Math.min(this.x, PR));
    const cy = Math.max(pusherY, Math.min(this.y, pusherY + PUSHER_H));
    const dx = this.x - cx, dy = this.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist >= this.r || dist < 0.001) return;
    const nx = dx / dist, ny = dy / dist;
    this.x = cx + nx * (this.r + 0.5);
    this.y = cy + ny * (this.r + 0.5);
    const pvy = pusherDir * PUSHER_SPD;
    const dot = this.vx * nx + (this.vy - pvy) * ny;
    if (dot < 0) { this.vx -= (1 + BOUNCE) * dot * nx; this.vy -= (1 + BOUNCE) * dot * ny; }
    if (ny > 0.4 && pusherDir > 0) { this.vy += pvy * 0.7; this.vx += (Math.random() - 0.5) * 0.3; }
  }

  draw() {
    const [sx, sy] = proj(this.x, this.y);
    const sc = dscale(this.y);
    const sr = this.r * sc;

    // Shadow ellipse on platform surface
    ctx.save();
    ctx.translate(sx, sy + sr * 0.15);
    ctx.scale(1.4, 0.3);
    ctx.beginPath(); ctx.arc(0, 0, sr, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
    ctx.restore();

    // Coin body
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(this.angle * sc);
    const g = ctx.createRadialGradient(-sr * 0.3, -sr * 0.35, 0, 0, 0, sr);
    g.addColorStop(0,    `hsl(${this.hue},95%,88%)`);
    g.addColorStop(0.35, `hsl(${this.hue},95%,${this.lit}%)`);
    g.addColorStop(0.75, `hsl(${this.hue},80%,${this.lit - 15}%)`);
    g.addColorStop(1,    `hsl(${this.hue},65%,22%)`);
    ctx.beginPath(); ctx.arc(0, 0, sr, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = `hsl(${this.hue},55%,28%)`; ctx.lineWidth = Math.max(0.5, 1.5 * sc); ctx.stroke();
    // Inner ring
    ctx.beginPath(); ctx.arc(0, 0, sr * 0.68, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${this.hue},85%,72%,0.4)`; ctx.lineWidth = sc; ctx.stroke();
    // Highlight
    ctx.beginPath(); ctx.arc(-sr * 0.22, -sr * 0.22, sr * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue},100%,90%,0.35)`; ctx.fill();
    ctx.restore();
  }
}

// ── Coin-coin collision ───────────────────────────────────────────
function resolveCoins() {
  const live = coins.filter(c => c.alive);
  for (let i = 0; i < live.length; i++) {
    for (let j = i + 1; j < live.length; j++) {
      const a = live[i], b = live[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d2 = dx * dx + dy * dy, md = a.r + b.r;
      if (d2 >= md * md) continue;
      const dist = Math.sqrt(d2) || 0.001;
      const nx = dx / dist, ny = dy / dist, ov = (md - dist) * 0.5;
      a.x -= nx * ov; a.y -= ny * ov; b.x += nx * ov; b.y += ny * ov;
      a.x = Math.max(PL + a.r, Math.min(PR - a.r, a.x));
      b.x = Math.max(PL + b.r, Math.min(PR - b.r, b.x));
      a.y = Math.max(PT + a.r, a.y); b.y = Math.max(PT + b.r, b.y);
      const dot = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
      if (dot > 0) continue;
      const imp = (1 + BOUNCE) * dot * 0.5;
      a.vx += imp * nx; a.vy += imp * ny; b.vx -= imp * nx; b.vy -= imp * ny;
    }
  }
}

// ── Initial coin pile ─────────────────────────────────────────────
function initCoins() {
  const diam = COIN_R * 2 + 2;
  const cols = Math.floor((PR - PL - COIN_R * 2) / diam);
  for (let row = 0; row < 5; row++) {
    const y = PB - COIN_R - row * diam;
    const offset = (row % 2) * COIN_R;
    const startX = PL + COIN_R + Math.floor((PR - PL - cols * diam) / 2);
    for (let col = 0; col < cols; col++) {
      const x = startX + col * diam + offset;
      if (x + COIN_R > PR) continue;
      const c = new Coin(x, y, 0, 0); c.vx = 0; c.vy = 0; coins.push(c);
    }
  }
  for (let i = 0; i < 12; i++) {
    const x = PL + COIN_R + Math.random() * (PR - PL - COIN_R * 2);
    const y = pusherY + PUSHER_H + COIN_R + Math.random() * 40;
    const c = new Coin(x, y, 0, 0); c.vx = 0; c.vy = 0; coins.push(c);
  }
}

// ── Drawing ───────────────────────────────────────────────────────
function drawBackground() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1e1040'); bg.addColorStop(1, '#06060e');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
}

function drawCabinetHeader() {
  // Header background
  const hg = ctx.createLinearGradient(0, 0, 0, D.headerH);
  hg.addColorStop(0, '#3a2278'); hg.addColorStop(1, '#22145a');
  ctx.fillStyle = hg; ctx.fillRect(0, 0, W, D.headerH);

  // Gold border
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
  ctx.strokeRect(4, 4, W - 8, D.headerH - 6);

  // Title
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px Arial'; ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 16;
  ctx.fillText('★  COIN  PUSHER  ★', W / 2, 40);
  ctx.shadowBlur = 0;
  ctx.font = '13px Arial'; ctx.fillStyle = '#FFA040';
  ctx.fillText('コイン落としゲーム', W / 2, 58);

  // Blinking lights
  const lc = ['#FF4040','#40FF40','#4444FF','#FFFF30','#FF40FF','#30FFFF'];
  for (let i = 0; i < 14; i++) {
    const x = 18 + i * 43, on = (Math.floor(frame / 14) + i) % 3 !== 0;
    ctx.beginPath(); ctx.arc(x, 7, 5, 0, Math.PI * 2);
    if (on) { ctx.fillStyle = lc[i % lc.length]; ctx.shadowColor = lc[i % lc.length]; ctx.shadowBlur = 9; }
    else    { ctx.fillStyle = '#1a1a2a'; ctx.shadowBlur = 0; }
    ctx.fill(); ctx.shadowBlur = 0;
  }
}

function drawMachineBody() {
  // Left side panel
  ctx.beginPath();
  ctx.moveTo(0, D.headerH);
  ctx.lineTo(D.backLeft, D.backY);
  ctx.lineTo(D.frontLeft, D.frontY);
  ctx.lineTo(D.frontLeft, D.frontY + D.faceH);
  ctx.lineTo(0, D.frontY + D.faceH + 20);
  ctx.lineTo(0, D.headerH);
  ctx.closePath();
  const lg = ctx.createLinearGradient(0, 0, D.backLeft, 0);
  lg.addColorStop(0, '#0a0820'); lg.addColorStop(1, '#18144a');
  ctx.fillStyle = lg; ctx.fill();
  ctx.strokeStyle = '#2a2060'; ctx.lineWidth = 1; ctx.stroke();

  // Right side panel
  ctx.beginPath();
  ctx.moveTo(W, D.headerH);
  ctx.lineTo(D.backRight, D.backY);
  ctx.lineTo(D.frontRight, D.frontY);
  ctx.lineTo(D.frontRight, D.frontY + D.faceH);
  ctx.lineTo(W, D.frontY + D.faceH + 20);
  ctx.lineTo(W, D.headerH);
  ctx.closePath();
  const rg = ctx.createLinearGradient(D.backRight, 0, W, 0);
  rg.addColorStop(0, '#18144a'); rg.addColorStop(1, '#0a0820');
  ctx.fillStyle = rg; ctx.fill();
  ctx.strokeStyle = '#2a2060'; ctx.lineWidth = 1; ctx.stroke();

  // Back wall (area between header and platform back edge)
  ctx.beginPath();
  ctx.moveTo(D.backLeft, D.backY);
  ctx.lineTo(D.backRight, D.backY);
  ctx.lineTo(W, D.headerH);
  ctx.lineTo(0, D.headerH);
  ctx.closePath();
  const bwg = ctx.createLinearGradient(0, D.headerH, 0, D.backY);
  bwg.addColorStop(0, '#160e38'); bwg.addColorStop(1, '#0c0a22');
  ctx.fillStyle = bwg; ctx.fill();

  // Drop zone hint label
  ctx.fillStyle = 'rgba(255,215,0,0.32)';
  ctx.font = '11px Arial'; ctx.textAlign = 'center';
  ctx.fillText('▼  タップ／クリックしてコイン投入  ▼', W / 2, D.headerH + 14);

  // Dashed line at back edge
  ctx.strokeStyle = 'rgba(255,215,0,0.3)'; ctx.lineWidth = 1;
  ctx.setLineDash([6, 5]);
  ctx.beginPath(); ctx.moveTo(D.backLeft, D.backY); ctx.lineTo(D.backRight, D.backY); ctx.stroke();
  ctx.setLineDash([]);
}

function drawPlatformSurface() {
  // Clip to trapezoid
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(D.backLeft, D.backY); ctx.lineTo(D.backRight, D.backY);
  ctx.lineTo(D.frontRight, D.frontY); ctx.lineTo(D.frontLeft, D.frontY);
  ctx.closePath(); ctx.clip();

  // Dark felt surface
  const sg = ctx.createLinearGradient(W / 2, D.backY, W / 2, D.frontY);
  sg.addColorStop(0, '#0c1a10'); sg.addColorStop(1, '#081208');
  ctx.fillStyle = sg; ctx.fill();

  // Perspective grid (faint green lines)
  ctx.strokeStyle = 'rgba(80,180,80,0.07)'; ctx.lineWidth = 1;
  for (let i = 1; i < 12; i++) {      // horizontal (parallel to back/front edge)
    const t = i / 12;
    const y  = D.backY  + t * (D.frontY  - D.backY);
    const x1 = D.backLeft  + t * (D.frontLeft  - D.backLeft);
    const x2 = D.backRight + t * (D.frontRight - D.backRight);
    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
  }
  for (let i = 1; i < 16; i++) {      // vertical (converging lines)
    const nx = i / 16;
    ctx.beginPath();
    ctx.moveTo(D.backLeft  + nx * (D.backRight  - D.backLeft),  D.backY);
    ctx.lineTo(D.frontLeft + nx * (D.frontRight - D.frontLeft), D.frontY);
    ctx.stroke();
  }
  ctx.restore();

  // Platform edge highlight (back)
  ctx.beginPath(); ctx.moveTo(D.backLeft, D.backY); ctx.lineTo(D.backRight, D.backY);
  ctx.strokeStyle = 'rgba(120,200,120,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Left/right platform edges (visible thickness)
  ctx.beginPath();
  ctx.moveTo(D.backLeft, D.backY); ctx.lineTo(D.frontLeft, D.frontY);
  ctx.lineTo(D.frontLeft - 8, D.frontY + 10); ctx.lineTo(D.backLeft - 6, D.backY + 8);
  ctx.closePath();
  const le = ctx.createLinearGradient(D.backLeft, 0, D.frontLeft - 8, 0);
  le.addColorStop(0, '#1a2a1a'); le.addColorStop(1, '#0a160a');
  ctx.fillStyle = le; ctx.fill();
  ctx.strokeStyle = '#2a3a2a'; ctx.lineWidth = 1; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(D.backRight, D.backY); ctx.lineTo(D.frontRight, D.frontY);
  ctx.lineTo(D.frontRight + 8, D.frontY + 10); ctx.lineTo(D.backRight + 6, D.backY + 8);
  ctx.closePath();
  const re = ctx.createLinearGradient(D.backRight, 0, D.frontRight + 8, 0);
  re.addColorStop(0, '#1a2a1a'); re.addColorStop(1, '#0a160a');
  ctx.fillStyle = re; ctx.fill();
  ctx.strokeStyle = '#2a3a2a'; ctx.lineWidth = 1; ctx.stroke();
}

function drawFrontFace() {
  const y1 = D.frontY, y2 = D.frontY + D.faceH;

  // Collection glow line
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#FFD700'; ctx.fillRect(D.frontLeft, y1, D.frontRight - D.frontLeft, 3);
  ctx.shadowBlur = 0;

  // Front face of machine
  ctx.beginPath();
  ctx.moveTo(D.frontLeft, y1); ctx.lineTo(D.frontRight, y1);
  ctx.lineTo(D.frontRight, y2); ctx.lineTo(D.frontLeft, y2); ctx.closePath();
  const fg = ctx.createLinearGradient(0, y1, 0, y2);
  fg.addColorStop(0, '#303850'); fg.addColorStop(0.5, '#202840'); fg.addColorStop(1, '#101820');
  ctx.fillStyle = fg; ctx.fill();
  ctx.strokeStyle = '#3a4860'; ctx.lineWidth = 1; ctx.stroke();

  // Collection tray below
  const ty = y2;
  ctx.fillStyle = '#080a10'; ctx.fillRect(D.frontLeft - 8, ty, D.frontRight - D.frontLeft + 16, H - ty);

  // Tray inner glow
  const tg = ctx.createLinearGradient(0, ty, 0, ty + 50);
  tg.addColorStop(0, 'rgba(255,215,0,0.08)'); tg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = tg; ctx.fillRect(D.frontLeft, ty, D.frontRight - D.frontLeft, 50);

  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 6;
  ctx.fillText('★ コイン回収ゾーン ★', W / 2, ty + 28); ctx.shadowBlur = 0;
}

function drawPusher3D() {
  // Four corners of pusher top face
  const [bx1, by1] = proj(PL, pusherY);
  const [bx2, by2] = proj(PR, pusherY);
  const [fx1, fy1] = proj(PL, pusherY + PUSHER_H);
  const [fx2, fy2] = proj(PR, pusherY + PUSHER_H);
  const FACE_H = 15;  // visible front face height in screen px

  // Top face (visible from above)
  ctx.beginPath();
  ctx.moveTo(bx1, by1); ctx.lineTo(bx2, by2);
  ctx.lineTo(fx2, fy2); ctx.lineTo(fx1, fy1); ctx.closePath();
  const tg = ctx.createLinearGradient(W / 2, by1, W / 2, fy2);
  tg.addColorStop(0, '#c8c8c8'); tg.addColorStop(0.4, '#f0f0f0'); tg.addColorStop(1, '#aaaaaa');
  ctx.fillStyle = tg; ctx.fill();
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 0.5; ctx.stroke();

  // Front face (visible because camera is above & in front)
  ctx.beginPath();
  ctx.moveTo(fx1, fy1); ctx.lineTo(fx2, fy2);
  ctx.lineTo(fx2, fy2 + FACE_H); ctx.lineTo(fx1, fy1 + FACE_H); ctx.closePath();
  const fg = ctx.createLinearGradient(0, fy1, 0, fy2 + FACE_H);
  fg.addColorStop(0, '#e0e0e0'); fg.addColorStop(0.3, '#aaaaaa'); fg.addColorStop(1, '#666');
  ctx.fillStyle = fg; ctx.fill();
  ctx.strokeStyle = '#999'; ctx.lineWidth = 1; ctx.stroke();

  // Top highlight
  ctx.beginPath(); ctx.moveTo(bx1, by1); ctx.lineTo(bx2, by2);
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2; ctx.stroke();

  // Bottom shadow
  ctx.beginPath(); ctx.moveTo(fx1, fy1 + FACE_H); ctx.lineTo(fx2, fy2 + FACE_H);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2; ctx.stroke();

  // Bolts on front face
  for (let i = 0; i < 9; i++) {
    const t = (i + 0.5) / 9;
    const bx = fx1 + t * (fx2 - fx1), by = fy1 + t * (fy2 - fy1) + FACE_H / 2;
    ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#555'; ctx.fill();
    ctx.beginPath(); ctx.arc(bx - 1, by - 1, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = '#999'; ctx.fill();
  }
}

function drawDropGuide() {
  if (!inDrop || playerCoins <= 0) return;
  const gx = dropGX(mouseX);
  const [px, py] = proj(gx, PT);

  // Guide line from hover point down to back edge
  ctx.strokeStyle = 'rgba(255,215,0,0.45)'; ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(mouseX, D.headerH + 6); ctx.lineTo(px, py); ctx.stroke();
  ctx.setLineDash([]);

  // Ghost coin at entry
  const sc = dscale(PT), sr = COIN_R * sc;
  ctx.beginPath(); ctx.arc(px, py, sr, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,215,0,0.25)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,165,0,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
}

// ── Update ────────────────────────────────────────────────────────
function update() {
  frame++;
  pusherY += pusherDir * PUSHER_SPD;
  if (pusherY >= PUSHER_MAX) { pusherY = PUSHER_MAX; pusherDir = -1; }
  if (pusherY <= PUSHER_MIN) { pusherY = PUSHER_MIN; pusherDir =  1; }
  if (dropCD > 0) dropCD--;
  for (const c of coins) c.update();
  coins = coins.filter(c => c.alive);
  resolveCoins(); resolveCoins();
  for (const p of particles) p.update(); particles = particles.filter(p => p.life > 0);
  for (const t of texts)     t.update(); texts     = texts.filter(t => t.life > 0);
}

// ── Draw ──────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawMachineBody();
  drawPlatformSurface();

  // Draw coins back-to-front (depth sort)
  const sorted = coins.filter(c => c.alive).sort((a, b) => a.y - b.y);
  for (const c of sorted) c.draw();

  drawPusher3D();
  drawFrontFace();

  for (const p of particles) p.draw();
  for (const t of texts)     t.draw();
  drawDropGuide();
  drawCabinetHeader(); // header on top
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// ── Input helpers ─────────────────────────────────────────────────
function toCanvas(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return { x: (clientX - r.left) * (W / r.width), y: (clientY - r.top) * (H / r.height) };
}

function tryDrop(sx, sy) {
  // Allow drop anywhere above the collection front edge and within machine width
  if (sy > D.frontY || sy < D.headerH) return;
  if (playerCoins <= 0) { texts.push(new FText(W / 2, 120, 'コインがありません！', '#FF5555')); return; }
  if (dropCD > 0) return;
  const gx = Math.max(PL + COIN_R, Math.min(PR - COIN_R, dropGX(sx)));
  coins.push(new Coin(gx, PT, 0, 2));
  playerCoins--; playerEl.textContent = playerCoins;
  dropCD = 12;
  playDrop();
}

function updateHover(sx, sy) {
  mouseX = sx; mouseY = sy;
  inDrop = sy >= D.headerH && sy < D.frontY;
}

// ── Mouse events ──────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const { x, y } = toCanvas(e.clientX, e.clientY);
  updateHover(x, y);
});
canvas.addEventListener('mouseleave', () => { inDrop = false; });
canvas.addEventListener('click', e => {
  const { x, y } = toCanvas(e.clientX, e.clientY);
  tryDrop(x, y);
});

// ── Touch events ──────────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0], { x, y } = toCanvas(t.clientX, t.clientY);
  updateHover(x, y); tryDrop(x, y);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.changedTouches[0], { x, y } = toCanvas(t.clientX, t.clientY);
  updateHover(x, y);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault(); inDrop = false;
}, { passive: false });

document.getElementById('refillBtn').addEventListener('click', () => {
  playerCoins += 20; playerEl.textContent = playerCoins;
  texts.push(new FText(W / 2, D.frontY + D.faceH - 10, '+20 コイン補充！', '#44FF99'));
});

// ── Init ──────────────────────────────────────────────────────────
initCoins();
loop();
</script>
</body>
</html>
